[package]
edition = "2021"
name    = "lora_easy"
version = "0.1.0"

[[bin]]
name = "tft_crust"
path = "./src/bin/main.rs"
[dependencies]
defmt = "0.3.10" 
embassy-net = { version = "0.6.0", features = [ 
  "dhcpv4",
  "medium-ethernet",
  "tcp",
  "udp",
] }
embedded-io = "0.6.1"
embedded-io-async = "0.6.1"
esp-alloc = "0.7.0" 
esp-hal = { version = "1.0.0-beta.0", features = [  
  "defmt",
  "esp32",
  "unstable",
] }
embassy-sync    = { version = "0.6", features = [] }
tinybmp = "0.6.0"
embedded-hal = "1.0"
embedded-hal-bus = { version = "0.1" }
display-interface-spi = "0.5"
ili9341 = "0.6.0"
st7789 = "0.4.0"
embedded-graphics = "0.8.1"
profont = "0.7.0"
esp-println = { version = "0.13.0", features = ["defmt-espflash", "esp32"] }  # ✅ Update
smoltcp = { version = "0.12.0", default-features = false, features = [
  "medium-ethernet",
  "multicast",
  "proto-dhcpv4",
  "proto-dns",
  "proto-ipv4",
  "socket-dns",
  "socket-icmp",
  "socket-raw",
  "socket-tcp",
  "socket-udp",
] }
critical-section = "1.2.0"
embassy-executor = { version = "0.7.0", features = [
  "defmt",
  "task-arena-size-20480",
] }
embassy-time = { version = "0.4.0", features = ["generic-queue-8"] }
esp-hal-embassy = { version = "0.7.0", features = ["esp32"] }  
tiny-rng = { version = "0.2", default-features = false }  
esp-wifi = { version = "0.13.0", features = [  
  "builtin-scheduler",
  "defmt",
  "esp-alloc",
  "esp32",
  "wifi",
] }
mipidsi = "0.8.0"

heapless = { version = "0.8.0", default-features = false }
static_cell = { version = "2.1.0", features = ["nightly"] }

[profile.dev]

opt-level = "s"

[profile.release]
codegen-units    = 1   
debug            = 2
debug-assertions = false
incremental      = false
lto              = 'fat'
opt-level        = 's'
overflow-checks  = false
